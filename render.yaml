services:
  - type: web
    name: ielts-anger-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GOOGLE_TTS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    autoDeploy: true
    healthCheckPath: /
    numReplicas: 1